<main class="contenido">
  <router-outlet />
</main>

@if (mostrarTabBar()) {
  <nav class="tab-bar">
    <a routerLink="/semana" routerLinkActive="activo" class="tab">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
      <span>Semana</span>
    </a>
    <a routerLink="/hoy" routerLinkActive="activo" class="tab">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="3" fill="currentColor" stroke="none"/>
      </svg>
      <span>Hoy</span>
    </a>
    <a routerLink="/habitos" routerLinkActive="activo" class="tab">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
      <span>Hábitos</span>
    </a>
  </nav>
}
