<div class="login">
  <h1 class="titulo">Personal</h1>
  <form class="form" (submit)="onSubmit(email.value, password.value, $event)">
    <input #email class="input" type="email" placeholder="Email" autocomplete="email" required />
    <input #password class="input" type="password" placeholder="Contraseña" autocomplete="current-password" required />
    <button class="btn" type="submit" [disabled]="cargando()">
      {{ cargando() ? 'Ingresando...' : 'Ingresar' }}
    </button>
    @if (error()) {
      <p class="error-msg">{{ error() }}</p>
    }
  </form>
</div>
